name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java JDK
      uses: actions/setup-java@v5.4.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install Project Dependencies
      run: |
        npm install

    - name: Build React Production Code
      run: |
        npm run build

    - name: Sync Web Code with Capacitor Android
      run: |
        npx cap sync android

    - name: Compile Android Studio Project (Debug APK)
      run: |
        cd android && ./gradlew assembleDebug

    # 🛠️ अगर बिल्ड फेल होता है, तो यह कमांड छिपी हुई रिपोर्ट का पूरा सच सीधे स्क्रीन पर छाप देगा
    - name: Print Gradle Error Report on Screen (If Failed)
      if: failure()
      run: |
        echo "=== GRAPLE PROBLEM REPORT ==="
        cat android/build/reports/problems/problems-report.html || echo "Report file not found"

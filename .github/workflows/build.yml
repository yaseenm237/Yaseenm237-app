name: Build Python APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer & System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools python3-wheel \
          git zip unzip openjdk-21-jdk \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev curl \
          autoconf automake libtool pkg-config ccache
        pip install --upgrade pip
        pip install buildozer cython

    # 💾 आपका पसंदीदा फीचर: अगर spec फाइल नहीं है तो बनाकर गिटहब पर ऑटो-पुश करो
    - name: Initialize Buildozer Spec (if missing)
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add buildozer.spec
          git commit -m "Automated sync: Created buildozer.spec file [skip ci]"
          git push origin main
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 🛠️ सुधार: यहाँ हमने एंड्रॉइड के सभी लाइसेंस को ऑटोमैटिकली 'Yes' कर दिया है
    - name: Auto-Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # पहले से मौजूद एंड्रॉइड होम के लाइसेंस को ऑटो-एक्सेप्ट करना
        if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        elif [ -d "$ANDROID_HOME/tools/bin" ]; then
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
        fi

    # 📱 अब बिल्डोजर बिना किसी लाइसेंस रुकावट के सीधे APK तैयार करेगा
    - name: Build APK (Debug Mode)
      run: |
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PythonApp-Debug-APK
        path: bin/*.apk

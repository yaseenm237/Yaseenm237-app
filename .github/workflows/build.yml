name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 🛠️ यहाँ Java 17 की जगह Java 21 कर दिया है ताकि Gradle एरर न दे
    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Project Dependencies
      run: |
        npm install

    - name: Build React Production Code
      run: |
        npm run build

    - name: Sync Web Code with Capacitor Android
      run: |
        npx cap sync android

    - name: Compile Android Studio Project (Debug APK)
      run: |
        cd android && ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Carpentry-Optimizer-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

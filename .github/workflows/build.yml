name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java JDK
      uses: actions/setup-java@v5.4.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install Project Dependencies
      run: |
        npm install

    - name: Build React Production Code
      run: |
        npm run build

    - name: Sync Web Code with Capacitor Android
      run: |
        npx cap sync android

    # 🛠️ यहाँ हमने '--console=plain' जोड़ दिया है ताकि लॉग्स बिल्कुल सीधे और साफ आएं
    - name: Compile Android Studio Project (Debug APK)
      run: |
        cd android && ./gradlew clean assembleDebug --console=plain

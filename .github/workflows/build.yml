name: Build Python APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🛠️ सुधार: यहाँ हमने libtool, pkg-config, autoconf और automake को पूरी तरह जोड़ दिया है
    - name: Install Buildozer & System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools python3-wheel \
          git zip unzip openjdk-21-jdk \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev curl \
          autoconf automake libtool pkg-config ccache
        pip install --upgrade pip
        pip install buildozer cython

    # 💾 आपका पसंदीदा फीचर: अगर spec फाइल नहीं है तो बनाकर गिटहब पर ऑटो-पुश करो
    - name: Initialize Buildozer Spec (if missing)
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add buildozer.spec
          git commit -m "Automated sync: Created buildozer.spec file [skip ci]"
          git push origin main
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 📱 बिल्डोजर को पूरी परमिशन और बिना रुकावट के चलाने के लिए कमांड सुधार
    - name: Build APK (Debug Mode)
      run: |
        buildozer android debug

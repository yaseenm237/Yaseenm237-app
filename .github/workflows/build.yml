name: Build Python APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer & System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools python3-wheel \
          git zip unzip openjdk-17-jdk \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev curl autoconf libtool
        pip install --upgrade pip
        pip install buildozer cython

    - name: Initialize Buildozer Spec (if missing)
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add buildozer.spec
          git commit -m "Automated sync: Created buildozer.spec file [skip ci]"
          git push origin main
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build APK (Debug Mode)
      run: |
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        export ANDROIDNDK=$HOME/.buildozer/android/platform/android-ndk-r28c
        export ANDROID_NDK=$ANDROIDNDK
        yes | buildozer android debug --arch=arm64-v8a

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PythonApp-Debug-APK
        path: bin/*.apk

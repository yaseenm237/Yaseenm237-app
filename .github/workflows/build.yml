name: Build Python APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    # सर्वर को रिपॉजिटरी में buildozer.spec फाइल लिखने (Push करने) की परमिशन देना
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🛠️ यहाँ Java 21 और आवश्यक टूल्स बिल्कुल वैसे ही हैं जैसे आपकी बेस्ट स्क्रिप्ट में थे
    - name: Install Buildozer & System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools python3-wheel \
          git zip unzip openjdk-21-jdk \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev curl autoconf libtool
        pip install --upgrade pip
        pip install buildozer cython

    # 💾 आपका पसंदीदा फीचर: अगर spec फाइल नहीं है तो बनाकर उसे तुरंत गिटहब पर सेव करो
    - name: Initialize Buildozer Spec (if missing)
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
          
          # गिटहब बॉट सेटअप करके फाइल को वापस रिपॉजिटरी में पुश करना
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add buildozer.spec
          git commit -m "Automated sync: Created buildozer.spec file [skip ci]"
          git push origin main
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 📱 यहाँ हमने आपकी स्क्रिप्ट में बस 2 लाइनें जोड़ी हैं ताकि गिटहब का नया NDK रास्ते में न आए
    - name: Build APK (Debug Mode)
      run: |
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        yes | buildozer android debug

    # 📦 सफलता का आख़िरी सिरा: APK को अपलोड करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PythonApp-Debug-APK
        path: bin/*.apk

name: Build Python APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🛠️ आपका आइडिया: यहाँ OpenJDK 17 को बिल्कुल फिक्स रखा गया है
    - name: Install Buildozer & System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools python3-wheel \
          git zip unzip openjdk-17-jdk \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev curl autoconf libtool pkg-config ccache
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" cython

    # 💾 आपका पसंदीदा फीचर: अगर spec फाइल नहीं है तो बनाकर उसे तुरंत गिटहब पर सेव करो
    - name: Initialize Buildozer Spec (if missing)
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
          
          # ऑटोमैटिकली सिंगल आर्किटेक्चर (arm64-v8a) सेट करना ताकि एरर न आए
          sed -i 's/android.archs = .*/android.archs = arm64-v8a/g' buildozer.spec
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add buildozer.spec
          git commit -m "Automated sync: Created buildozer.spec with single arch [skip ci]"
          git push origin main
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 📱 आपका आइडिया: गिटहब के प्री-इंस्टॉल्ड NDK को हटाकर सीधे सिंगल आर्किटेक्चर बिल्ड करना
    - name: Build APK (Debug Mode)
      run: |
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PythonApp-Debug-APK
        path: bin/*.apk

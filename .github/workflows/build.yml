name: Build Android APK & Sync Repo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies and Build Web Project
      run: |
        npm install
        npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🛠️ यहाँ सुधार किया है: कैपेसिटर CLI और कोर को पहले सही से इंस्टॉल कर रहे हैं
    - name: Setup Capacitor CLI and Android Platform
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx capacitor add android || npx cap add android || echo "Android platform already added"
        npx capacitor sync android || npx cap sync android

    - name: Automatically Push Created Files Back to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff-index --quiet HEAD || git commit -m "Automated sync: Added Android & JSON config files [skip ci]"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MyAIApp-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java JDK
      uses: actions/setup-java@v5.4.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install Project Dependencies
      run: |
        npm install

    - name: Build React Production Code
      run: |
        npm run build

    # 🛠️ यहाँ sync की जगह update लगाया है ताकि सारी डिपेंडेंसी ताज़ा हो जाएं
    - name: Update Capacitor Android Dependencies
      run: |
        npx cap update android

    # 🛠️ यहाँ पहले 'clean' कमांड जोड़ा है, फिर 'assembleDebug' और साथ में '--stacktrace'
    - name: Compile Android Studio Project (Debug APK)
      run: |
        cd android && ./gradlew clean assembleDebug --stacktrace

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Carpentry-Optimizer-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

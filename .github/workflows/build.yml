name: Build Python APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer & System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools python3-wheel \
          git zip unzip openjdk-17-jdk \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev curl \
          autoconf automake libtool pkg-config ccache
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" cython

    - name: Initialize Buildozer Spec (if missing)
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
        fi
        
        # 🔥 यहाँ सुधार किया है: फाइल चाहे नई हो या पुरानी, NDK वर्जन को r25b पर फोर्स करना
        sed -i 's/# android.ndk = 23b/android.ndk = 25b/g' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25b/g' buildozer.spec
        
        # ऑटो-पुश अपडेट्स वापस गिटहब पर
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add buildozer.spec
        git diff-index --quiet HEAD || git commit -m "Automated sync: Force NDK to r25b [skip ci]"
        git push origin main || echo "Push failed or nothing to push"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Auto-Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        elif [ -d "$ANDROID_HOME/tools/bin" ]; then
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
        fi

    - name: Build APK (Debug Mode)
      run: |
        # गिटहब के बाहरी वेरिएबल्स को हटाकर बिल्डोजर को अपनी सेटिंग चलाने देना
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PythonApp-Debug-APK
        path: bin/*.apk

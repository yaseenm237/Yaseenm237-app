name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java JDK
      uses: actions/setup-java@v5.4.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install Project Dependencies
      run: |
        npm install

    - name: Build React Production Code
      run: |
        npm run build

    - name: Sync Web Code with Capacitor Android
      run: |
        npx cap sync android

    - name: Compile Android Studio Project (Debug APK)
      run: |
        cd android && ./gradlew assembleDebug

    # 🛠️ अगर बिल्ड फेल होता है, तो यह स्टेप ग्रैडल की छिपी हुई रिपोर्ट को आपके लिए सेव कर देगा
    - name: Upload Gradle Problem Report (If Failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Gradle-Problems-Report
        path: android/build/reports/problems/

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Carpentry-Optimizer-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

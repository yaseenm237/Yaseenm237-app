name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'   # ✅ Latest supported Node.js
        cache: 'npm'

    - name: Setup Java JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'   # ✅ Stable for Android Gradle
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install Project Dependencies
      run: npm install

    - name: Build React Production Code
      run: npm run build

    - name: Sync Android Platform
      run: npx cap sync android

    # 🤖 Debug APK compile
    - name: Compile Debug APK
      run: |
        cd android && ./gradlew assembleDebug

    # 🤖 Release APK compile (unsigned)
    - name: Compile Release APK
      run: |
        cd android && ./gradlew assembleRelease

    # 📦 Upload both APKs as artifacts
    - name: Upload Debug and Release APKs
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Carpentry-Optimizer-APKs
        path: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release.apk
